<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In - Café Aroma</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="auth-page">
<div class="auth-left"><img src="images/cafe-auth.jpg" alt="Cafe"><div class="overlay"></div>
<div class="text"><div class="brand"><img src="images/cafe-logo.png" alt="Café Aroma"><h1>Café Aroma</h1></div>
<p class="desc">Manage your café effortlessly. From orders to billing, everything in one beautiful dashboard.</p>
<div class="auth-stats"><div class="stat"><p class="val">1.2K+</p><p class="lbl">Orders</p></div><div class="stat"><p class="val">₹2.4L</p><p class="lbl">Revenue</p></div><div class="stat"><p class="val">500+</p><p class="lbl">Customers</p></div></div></div></div>
<div class="auth-right"><div class="auth-form-wrap">
<div style="display:none" class="mobile-brand"><img src="images/cafe-logo.png" alt="Café Aroma" style="height:40px;width:40px"><h1 style="font-size:24px;margin-left:12px">Café Aroma</h1></div>
<h2 id="auth-title">Welcome back</h2><p class="sub" id="auth-sub">Sign in to manage your café</p>
<div class="auth-tabs"><button class="active" id="signin-tab" onclick="switchAuth(true)">Sign In</button><button id="signup-tab" onclick="switchAuth(false)">Sign Up</button></div>
<form class="auth-form" onsubmit="event.preventDefault();window.location.href='index.html'">
<div class="input-group" id="name-field" style="display:none"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><input type="text" placeholder="Full name"></div>
<div class="input-group"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span><input type="email" placeholder="Email address"></div>
<div class="input-group"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><input type="password" id="pw-input" placeholder="Password"><button type="button" class="toggle-pw" onclick="togglePw()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button></div>
<div class="forgot-link" id="forgot-link"><a>Forgot password?</a></div>
<button type="submit" class="submit-btn"><span id="auth-btn-text">Sign In</span> <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
<div class="divider"><div class="line"></div><div class="text">or continue with</div></div>
<div class="social-btns">
<button type="button" class="social-btn"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google</button>
<button type="button" class="social-btn"><svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg> Apple</button>
</div></form>
<p class="auth-footer" id="auth-footer">Don't have an account? <button onclick="switchAuth(false)">Sign Up</button></p>
</div></div></div>
<script>
function switchAuth(isLogin){
  document.getElementById('auth-title').textContent=isLogin?'Welcome back':'Create account';
  document.getElementById('auth-sub').textContent=isLogin?'Sign in to manage your café':'Get started with Café Aroma today';
  document.getElementById('name-field').style.display=isLogin?'none':'block';
  document.getElementById('forgot-link').style.display=isLogin?'block':'none';
  document.getElementById('auth-btn-text').textContent=isLogin?'Sign In':'Create Account';
  document.getElementById('signin-tab').className=isLogin?'active':'';
  document.getElementById('signup-tab').className=isLogin?'':'active';
  document.getElementById('auth-footer').innerHTML=isLogin?"Don't have an account? <button onclick=\"switchAuth(false)\">Sign Up</button>":"Already have an account? <button onclick=\"switchAuth(true)\">Sign In</button>";
}
function togglePw(){var i=document.getElementById('pw-input');i.type=i.type==='password'?'text':'password';}
</script></body></html>
