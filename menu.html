<div class="menu-bar">
<div class="search-box"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input id="menu-search" placeholder="Search menu items..." oninput="searchMenu(this.value)"></div>

</div>
<div class="category-pills"><button class="category-pill active" onclick="filterMenu('All',this)">All</button><button class="category-pill" onclick="filterMenu('☕ Coffee',this)">☕ Coffee</button><button class="category-pill" onclick="filterMenu('🥐 Snacks',this)">🥐 Snacks</button><button class="category-pill" onclick="filterMenu('🍰 Desserts',this)">🍰 Desserts</button><button class="category-pill" onclick="filterMenu('🥤 Beverages',this)">🥤 Beverages</button><button class="category-pill" onclick="filterMenu('🍕 Meals',this)">🍕 Meals</button></div>
